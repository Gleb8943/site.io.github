body { font-family: 'Open Sans', sans-serif; margin:20px; }


.slider-wrap {

}
.slider {
  width: 100%;
  overflow: hidden;
  position: relative;
  border: 1px solid #ddd;

  background:#fff;
}
.track {
  display: flex;
  transition: transform 0.4s ease;
  touch-action: pan-y;
}
.slide {
  min-width: 100%;
  box-sizing: border-box;
}
.slide img { display:block; width:100%; height:auto; }


.controls {
  position: absolute;
  top:50%;
  left:0;
  right:0;
  transform:translateY(-50%);
  display:flex;
  justify-content:space-between;
  pointer-events:none;
}
.btn {
  pointer-events:all;
  background: rgba(0,0,0,0.5);

  border:none;
  padding:10px 14px;
  margin:0 8px;
  border-radius:4px;
  cursor:pointer;
}

.dots { text-align:center; margin-top:8px; }
.dot {
  display:inline-block; width:10px; height:10px; border-radius:50%; background:#ccc; margin:0 5px; cursor:pointer;
}
.dot.active { background:#333; }

<script>
(function(){
  const track = document.getElementById('track');
  const slides = Array.from(track.children);
  const prev = document.getElementById('prev');
  const next = document.getElementById('next');
  const dotsContainer = document.getElementById('dots');
  let index = 0;
  const total = slides.length;

  for (let i=0;i<total;i++){
    const d = document.createElement('span');
    d.className = 'dot' + (i===0 ? ' active' : '');
    d.dataset.index = i;
    d.addEventListener('click', () => goTo(parseInt(d.dataset.index,10)));
    dotsContainer.appendChild(d);
  }
  const dots = Array.from(dotsContainer.children);

  function update() {
    const offset = -index * 100;
    track.style.transform = 'translateX(' + offset + '%)';
    dots.forEach((d,i) => d.classList.toggle('active', i===index));
  }

  function goTo(i){
    index = (i + total) % total;
    update();
  }

  prev.addEventListener('click', () => goTo(index - 1));
  next.addEventListener('click', () => goTo(index + 1));

  let startX = null;
  track.addEventListener('pointerdown', e => { startX = e.clientX; track.setPointerCapture(e.pointerId); });
  track.addEventListener('pointerup', e => {
    if (startX === null) return;
    const dx = e.clientX - startX;
    if (dx > 40) goTo(index - 1);
    else if (dx < -40) goTo(index + 1);
    startX = null;
  });
  track.addEventListener('pointercancel', () => startX = null);

  update();
})();
</script>
